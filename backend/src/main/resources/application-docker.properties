# ===========================================
# Docker Profile - application-docker.properties
# ===========================================
# This profile is activated when running inside Docker.
# All sensitive values are read from environment variables.

# --- Server ---
server.port=${SERVER_PORT:8080}

# --- Database (PostgreSQL) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/pieca_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pieca_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pieca_secret_password}
spring.datasource.driver-class-name=org.postgresql.Driver
# --- Liquibase ---
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Security & JWT ---
application.security.jwt.expiration=${JWT_EXPIRATION:600000}

# --- CORS ---
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost}

# --- Multipart Upload ---
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=6MB

# --- Mail (Mailtrap) ---
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:f4eb96207555cd}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

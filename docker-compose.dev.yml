# =============================================
# PFR2-pieca — Docker Compose Configuration (DEV)
# =============================================

services:
  # ─── PostgreSQL Database ───────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: pieca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pieca-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend (Hot-Reload) ──────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: pieca-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-600000}
      SERVER_PORT: ${SERVER_PORT:-8080}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DEVTOOLS_ADD_PROPERTIES: "false"
      SPRING_LIQUIBASE_ENABLED: "false"
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pieca-network

  # ─── Angular Frontend (Hot-Reload) ─────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pieca-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - pieca-network

# ─── Volumes ─────────────────────────────────
volumes:
  postgres_data:
    driver: local
  maven_cache:
    driver: local

# ─── Networks ────────────────────────────────
networks:
  pieca-network:
    driver: bridge
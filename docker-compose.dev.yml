# =============================================
# PFR2-pieca — Docker Compose Configuration (DEV)
# =============================================
# Usage:
#   docker compose up -d          → Start all services
#   docker compose down           → Stop all services
#   docker compose logs -f        → Follow logs
#   docker compose logs -f backend → Follow backend logs specifically

services:
  # ─── PostgreSQL Database ───────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: pieca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pieca-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend (Hot-Reload) ──────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: pieca-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SERVER_PORT: ${SERVER_PORT:-8080}
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-http://localhost}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      # Mount the local backend directory to /app
      - ./backend:/app
      # Cache Maven dependencies in a named volume so they persist across restarts
      # but don't clash with the host machine's ~/.m2
      - maven_cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pieca-network

  # ─── Angular Frontend (Hot-Reload) ─────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pieca-frontend
    restart: unless-stopped
    ports:
      # ng serve runs on port 4200 by default, so we map host:80 to container:4200
      - "${FRONTEND_PORT:-80}:4200"
    volumes:
      # Mount the local frontend directory to /app
      - ./frontend:/app
      # Prevent the host OS node_modules from overriding the container's node_modules
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - pieca-network

# ─── Volumes ─────────────────────────────────
volumes:
  postgres_data:
    driver: local
  maven_cache:
    driver: local

# ─── Networks ────────────────────────────────
networks:
  pieca-network:
    driver: bridge

<style>
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .animate-fade-in { opacity: 0; animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  .delay-100 { animation-delay: 100ms; }
  .delay-200 { animation-delay: 200ms; }
  .delay-300 { animation-delay: 300ms; }
</style>

<div class="min-h-screen bg-gray-50 flex flex-col justify-center items-center py-12 px-4 sm:px-6 relative overflow-hidden">
  
  <div class="absolute inset-0 pattern-dots opacity-5" style="background-image: radial-gradient(#255362 2px, transparent 2px); background-size: 30px 30px;"></div>

  <div class="w-full max-w-md relative z-10 flex flex-col items-center">
    <a routerLink="/" class="text-4xl font-black tracking-tighter text-gray-900 mb-10 animate-fade-in">PIÈCA<span class="text-[#d89940]">.</span></a>
    
    <div class="bg-white w-full p-8 sm:p-12 rounded-md shadow-2xl shadow-gray-200/50 border border-gray-100 animate-fade-in delay-100">
      <h2 class="text-3xl font-black text-gray-900 mb-2 tracking-tight text-center">Espace Connexion</h2>
      <p class="text-gray-500 font-medium mb-10 text-sm text-center">Renseignez vos identifiants pour accéder à votre espace pro ou acheteur.</p>
      
      <form class="space-y-6">
        <div class="animate-fade-in delay-200">
          <label class="block text-xs font-black text-gray-900 mb-2 uppercase tracking-widest">Adresse email</label>
          <input type="email" class="w-full bg-gray-50 border border-gray-200 px-5 py-3 rounded-sm focus:outline-none focus:ring-2 focus:ring-[#255362] transition-colors text-gray-900 font-medium" placeholder="exemple@entreprise.com" />
        </div>
        
        <div class="animate-fade-in delay-300">
          <div class="flex justify-between items-center mb-2">
            <label class="block text-xs font-black text-gray-900 uppercase tracking-widest">Mot de passe</label>
            <a href="#" class="text-[#255362] text-xs font-bold hover:underline">Oublié ?</a>
          </div>
          <input type="password" class="w-full bg-gray-50 border border-gray-200 px-5 py-3 rounded-sm focus:outline-none focus:ring-2 focus:ring-[#255362] transition-colors text-gray-900 font-medium" placeholder="••••••••" />
        </div>
        
        <button type="button" class="w-full bg-gray-900 hover:bg-gray-800 text-white font-black uppercase tracking-widest text-sm py-4 rounded-sm shadow-md transition-colors mt-4 inline-flex items-center justify-center gap-3 group animate-fade-in delay-300">
          S'identifier
          <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        </button>
      </form>
    </div>
    
    <div class="mt-8 text-center text-sm font-medium text-gray-500 animate-fade-in delay-300">
      Pas encore de compte ? 
      <a routerLink="/register" class="text-[#255362] font-black hover:underline ml-1">Créer un compte</a>
    </div>
  </div>
</div>

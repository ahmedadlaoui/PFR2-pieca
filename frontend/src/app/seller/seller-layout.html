<div class="min-h-screen bg-[#f4f6fb] font-sans text-gray-900 flex flex-col">
  <header class="bg-white w-full z-50 border-b border-gray-100 sticky top-0 shrink-0">
    <div class="w-full px-4 sm:px-6 md:px-8 h-16 sm:h-20 flex items-center justify-between gap-4">
      <div class="flex items-center gap-4">
        <button (click)="toggleSidebar()" class="md:hidden p-2 -ml-2 text-gray-400 hover:text-gray-900 focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <a routerLink="/" class="text-2xl sm:text-3xl font-black tracking-tighter text-gray-900">PIECA<span class="text-gray-400">.</span></a>
      </div>

      <nav class="hidden lg:flex items-center gap-6">
        <a routerLink="/" class="text-sm font-semibold text-gray-500 hover:text-gray-900 transition-colors">Accueil</a>
        <a routerLink="/seller/dashboard" class="text-sm font-semibold text-gray-500 hover:text-gray-900 transition-colors">Dashboard vendeur</a>
      </nav>

      <div class="flex items-center gap-3">
        <div *ngIf="currentUser" class="relative">
          <button (click)="toggleDropdown()" class="flex items-center gap-3 group cursor-pointer focus:outline-none">
            <div *ngIf="!currentUser.profileImageUrl" class="w-8 h-8 sm:w-10 sm:h-10 bg-[#255362] text-white rounded-full flex items-center justify-center text-sm font-black tracking-tight">{{ getInitials() }}</div>
            <img *ngIf="currentUser.profileImageUrl" [src]="currentUser.profileImageUrl" class="w-8 h-8 sm:w-10 sm:h-10 rounded-full object-cover border-2 border-gray-200" alt="Profile" />
            <div class="hidden sm:flex flex-col items-start pr-2">
              <span class="text-sm font-bold text-gray-900 leading-tight">{{ currentUser.firstName }} {{ currentUser.lastName }}</span>
              <span class="text-xs text-gray-400 font-medium">Vendeur</span>
            </div>
            <svg class="w-4 h-4 text-gray-400 group-hover:text-gray-900 transition-colors hidden sm:block" [class.rotate-180]="dropdownOpen" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>

          <div *ngIf="dropdownOpen" class="absolute right-0 mt-3 w-56 bg-white border border-gray-100 rounded-md shadow-xl z-50 overflow-hidden">
            <div class="px-5 py-4 border-b border-gray-100">
              <p class="text-sm font-bold text-gray-900">{{ currentUser.firstName }} {{ currentUser.lastName }}</p>
              <p class="text-xs text-gray-400 font-medium truncate">{{ currentUser.email }}</p>
            </div>
            <div class="border-t border-gray-100 py-2">
              <a routerLink="/seller/profile" class="w-full flex items-center gap-3 px-5 py-3 text-sm font-semibold text-gray-700 hover:bg-gray-50 transition-colors cursor-pointer">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                Profil
              </a>
              <button (click)="logout()" class="w-full flex items-center gap-3 px-5 py-3 text-sm font-bold text-red-600 hover:bg-red-50 transition-colors cursor-pointer">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Deconnexion
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden w-full">
    <div (click)="toggleSidebar()" *ngIf="sidebarOpen" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-30 md:hidden"></div>

    <aside [class.translate-x-0]="sidebarOpen" [class.-translate-x-full]="!sidebarOpen" class="fixed md:static inset-y-0 left-0 w-64 bg-white border-r border-gray-100 z-40 transform transition-transform duration-200 ease-in-out md:translate-x-0 flex flex-col justify-between">
      <div class="p-6 overflow-y-auto">
        <p class="text-[11px] uppercase tracking-widest font-black text-gray-400 mb-4">Tableau vendeur</p>
        <nav class="space-y-1.5">
          <a routerLink="/seller/dashboard" routerLinkActive="bg-[#f3f8fa] text-[#255362] font-bold" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>
            Tableau de bord
          </a>
          <a routerLink="/seller/pending-requests" routerLinkActive="bg-[#f3f8fa] text-[#255362] font-bold" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6M7 4h10a2 2 0 012 2v12a2 2 0 01-2 2H7a2 2 0 01-2-2V6a2 2 0 012-2z"/></svg>
            Demandes en attente
          </a>
        </nav>
      </div>

      <div class="p-6 border-t border-gray-100">
        <nav class="space-y-1.5">
          <a routerLink="/seller/profile" routerLinkActive="bg-[#f3f8fa] text-[#255362] font-bold" class="flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors cursor-pointer">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            Profil
          </a>
          <button (click)="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-bold text-red-600 hover:bg-red-50 transition-colors cursor-pointer">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            Deconnexion
          </button>
        </nav>
      </div>
    </aside>

    <main class="flex-1 overflow-y-auto bg-[#f4f6fb] relative">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

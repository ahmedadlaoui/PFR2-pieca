<div class="py-2 px-2 w-full flex flex-col gap-2">
  <div class="bg-white border border-gray-100 rounded-xl p-5 md:p-6 shadow-sm">
    <p class="text-[11px] uppercase tracking-[0.2em] font-black text-[#255362]">Profil vendeur</p>
    <h1 class="text-2xl font-black text-gray-900 mt-1">Modifier mes informations</h1>
    <p class="text-sm text-gray-500 mt-1.5 font-medium">Template frontend uniquement. Le bouton enregistrer sera branche plus tard.</p>
  </div>

  <div class="bg-white border border-gray-100 rounded-xl p-5 md:p-6 shadow-sm">
    <form class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-black uppercase tracking-widest text-gray-500 mb-1.5">Prenom</label>
        <input [(ngModel)]="profile.firstName" name="firstName" type="text" class="w-full px-3 py-2.5 rounded border border-gray-200 bg-white text-sm font-semibold text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#255362]/20 focus:border-[#255362]" />
      </div>
      <div>
        <label class="block text-xs font-black uppercase tracking-widest text-gray-500 mb-1.5">Nom</label>
        <input [(ngModel)]="profile.lastName" name="lastName" type="text" class="w-full px-3 py-2.5 rounded border border-gray-200 bg-white text-sm font-semibold text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#255362]/20 focus:border-[#255362]" />
      </div>

      <div>
        <label class="block text-xs font-black uppercase tracking-widest text-gray-500 mb-1.5">Email</label>
        <input [(ngModel)]="profile.email" name="email" type="email" class="w-full px-3 py-2.5 rounded border border-gray-200 bg-white text-sm font-semibold text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#255362]/20 focus:border-[#255362]" />
      </div>
      <div>
        <label class="block text-xs font-black uppercase tracking-widest text-gray-500 mb-1.5">Telephone</label>
        <input [(ngModel)]="profile.phone" name="phone" type="text" class="w-full px-3 py-2.5 rounded border border-gray-200 bg-white text-sm font-semibold text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#255362]/20 focus:border-[#255362]" />
      </div>

      <div>
        <label class="block text-xs font-black uppercase tracking-widest text-gray-500 mb-1.5">Nom du service</label>
        <input [(ngModel)]="profile.serviceName" name="serviceName" type="text" class="w-full px-3 py-2.5 rounded border border-gray-200 bg-white text-sm font-semibold text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#255362]/20 focus:border-[#255362]" />
      </div>
      <div>
        <label class="block text-xs font-black uppercase tracking-widest text-gray-500 mb-1.5">Ville</label>
        <input [(ngModel)]="profile.city" name="city" type="text" class="w-full px-3 py-2.5 rounded border border-gray-200 bg-white text-sm font-semibold text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#255362]/20 focus:border-[#255362]" />
      </div>

      <div class="md:col-span-2">
        <label class="block text-xs font-black uppercase tracking-widest text-gray-500 mb-1.5">Adresse</label>
        <input [(ngModel)]="profile.address" name="address" type="text" class="w-full px-3 py-2.5 rounded border border-gray-200 bg-white text-sm font-semibold text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#255362]/20 focus:border-[#255362]" />
      </div>

      <div>
        <label class="block text-xs font-black uppercase tracking-widest text-gray-500 mb-1.5">Rayon d'intervention (km)</label>
        <input [(ngModel)]="profile.radiusKm" name="radiusKm" type="number" class="w-full px-3 py-2.5 rounded border border-gray-200 bg-white text-sm font-semibold text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#255362]/20 focus:border-[#255362]" />
      </div>

      <div class="md:col-span-2">
        <label class="block text-xs font-black uppercase tracking-widest text-gray-500 mb-1.5">Description</label>
        <textarea [(ngModel)]="profile.about" name="about" rows="4" class="w-full px-3 py-2.5 rounded border border-gray-200 bg-white text-sm font-semibold text-gray-800 focus:outline-none focus:ring-2 focus:ring-[#255362]/20 focus:border-[#255362]"></textarea>
      </div>

      <div class="md:col-span-2 flex justify-end pt-1">
        <button type="button" class="inline-flex items-center justify-center px-4 py-2.5 rounded bg-[#255362] text-white text-xs font-black uppercase tracking-widest hover:bg-[#1d4450] transition-colors shadow-sm hover:shadow-md">
          Enregistrer les modifications
        </button>
      </div>
    </form>
  </div>
</div>
